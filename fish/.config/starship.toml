# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# See presets:
#
# Plain Text Symbol
#	https://starship.rs/presets/plain-text.html
#


[status]
disabled = false

[[battery.display]]
threshold=25

# Git prompt reads: 'on master (at a488cbf) with +597 -72 changes [status]'
[git_branch]
symbol = "on "
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_commit]
format = '[\(at $hash$tag\)]($style) '
tag_disabled = false
tag_symbol = " tag "

[git_metrics]
disabled = false
format = "with [+$added]($added_style) [-$deleted]($deleted_style) changes "

[git_status]
staged = "+count "
modified = "!$count "
untracked = "?$count"

[c]
symbol = "C "

[cmake]
symbol = "cmake "

[directory]
read_only = " ro"
fish_style_pwd_dir_length = 1

[direnv]
disabled = false

[docker_context]
symbol = "docker "

[memory_usage]
symbol = "memory "

[meson]
symbol = "meson "

[package]
# If the directory builds a _package_, show the current version.
# Not desireable since this is often redundant with git information.
disabled = true

[python]
symbol = "py "
# python_binary = [['poetry', 'env', 'info', '--executable']]

[rust]
symbol = "rs "

[sudo]
disabled = false
symbol = "sudo "

[time]
disabled = false

[jobs]

[env_var.FISH_JOB_NAMES]
format = "[(bg: $env_value)]($style) "
style = "bold blue"
